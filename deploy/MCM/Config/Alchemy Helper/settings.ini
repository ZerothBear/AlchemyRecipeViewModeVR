; Alchemy Recipe View VR default settings.
; Do not modify this file directly.
; To make persistent user changes outside the MCM, copy values into Data\MCM\Settings\AlchemyRecipeViewVR.ini.

[Controls]
; Toggle key for Recipe View mode (DirectX scancode). Default: 43 = backslash (\).
iToggleKey = 43

[Behavior]
; Show a navigation button hint when Recipe View mode is active.
bShowNavButton = 1

; Prevent potion crafting while Recipe View mode is active.
bBlockCraftWhileEnabled = 1

[General]
; Master toggle for the mod.
bEnable = 1

; Enable verbose debug logging.
bDebugLogging = 0

; Action toggle: reset all settings to defaults.
bResetSettings = 0
